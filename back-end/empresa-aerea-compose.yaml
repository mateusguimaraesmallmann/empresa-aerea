services:

  # DATABASE MONGODB
  mongo-db:
    image: mongo
    container_name: mongo-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin

  # MS-AUTH
  ms-auth:
    build:
      context: ./ms-auth
    container_name: ms-auth
    ports:
      - "8080:8080"
    depends_on:
      - mongo-db